name: Lean Certified Proof Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Initialize project (get mathlib first)
        run: |
          lake update

      - name: Sync toolchain EXACTLY to Mathlib
        run: |
          cp .lake/packages/mathlib/lean-toolchain ./lean-toolchain
          cat lean-toolchain
          source $HOME/.elan/env
          elan install $(cat lean-toolchain)
          elan default $(cat lean-toolchain)

      - name: Clean broken state (important)
        run: |
          rm -rf build .lake/build

      - name: Fetch Mathlib cache (now safe)
        run: lake exe cache get

      - name: Build proofs deterministically
        run: |
          mkdir -p Certified
          for file in ChronoFlow/*.lean; do
            echo "Checking $file"
            if lake env lean "$file"; then
              echo "✔ VERIFIED: $file"
              cp "$file" Certified/
            else
              echo "❌ FAILED: $file"
              exit 1
            fi
          done

      - name: Show certified proofs
        run: ls -la Certified
